name: Perp signals
on:
  schedule:
    - cron: "40 */4 * * *"   # every 4h; the bot posts irregularly, dedup makes reruns cheap
  workflow_dispatch:
permissions:
  contents: write
jobs:
  perp-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install telethon
      - env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: python scripts/perp_signals.py   # no-op skip while secrets are absent
      - run: |
          [ -f data/perp_signals.json ] || { echo "no data file (secrets absent?), nothing to commit"; exit 0; }
          git config user.name "snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/perp_signals.json
          git diff --cached --quiet || git commit -m "perp signals $(date -u +%F)"
          git push
