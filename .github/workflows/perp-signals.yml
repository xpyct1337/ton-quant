name: Perp signals
on:
  schedule:
    - cron: "40 */4 * * *"   # every 4h; the bot posts irregularly, dedup makes reruns cheap
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: data-writers
  cancel-in-progress: false
jobs:
  perp-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install telethon
      - env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: python scripts/perp_signals.py   # no-op skip while secrets are absent
      - name: DEX signal collector
        run: |
          : > /tmp/ton-quant-failed
          python scripts/dex_signals.py || echo dex_signals >> /tmp/ton-quant-failed
      - run: |
          python scripts/health.py --write --validate --checked perp_signals dex_signals \
            --failed $(tr '\n' ' ' < /tmp/ton-quant-failed)
      - run: |
          git config user.name "snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          for f in data/perp_signals.json data/dex_signals.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          git add data/health.json
          git diff --cached --quiet || git commit -m "tg signals $(date -u +%F)"
          ok=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main 2>/dev/null && git push; then
              ok=1; break
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((i * 15))
          done
          [ "$ok" = "1" ] || echo "::warning::push failed after 5 attempts, will retry tomorrow"
