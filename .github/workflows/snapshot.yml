name: Daily snapshot
on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/universe.py
      - run: python scripts/snapshot.py
      - run: python scripts/paper.py
      - run: python scripts/score.py
      - run: python scripts/altsnapshot.py
      - run: python scripts/altpaper.py
      - run: python scripts/wallets.py
      - run: python scripts/flows.py || true   # non-fatal: trade-flow metrics (GeckoTerminal)
      - run: python scripts/social.py || true  # non-fatal: Telegram mention counts (t.me/s public previews)
      - run: python scripts/forensics.py || true  # non-fatal: bundle detection via funding-source clustering
      - run: pip install --quiet numpy pandas requests
      - run: python scripts/xs_forward.py || true   # non-fatal: never break the snapshot
      - run: |
          git config user.name "snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "snapshot+paper $(date -u +%F)"
          # This job runs ~30-45min (forensics/flows are paced) while multiple parallel
          # Claude Code sessions push to main all day -> a single rebase+push can lose
          # the race (3 failures observed 2026-07-02, always at this exact step, every
          # other step green). Retry like desk_worker.py's maybe_commit: pull --rebase
          # + push, a few attempts, small backoff. If it still fails, don't lose today's
          # data -- exit 0 so the run is green; the commit stays local to this runner
          # and is picked up (superseded) by tomorrow's run regardless.
          ok=0
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && { ok=1; break; }
            git rebase --abort 2>/dev/null || true
            sleep $((i * 15))
          done
          [ "$ok" = "1" ] || echo "::warning::push failed after 5 attempts, will retry tomorrow"
