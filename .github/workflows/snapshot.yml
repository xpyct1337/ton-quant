name: Daily snapshot
on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/universe.py
      - run: python scripts/snapshot.py
      - run: python scripts/paper.py
      - run: python scripts/score.py
      - run: python scripts/altsnapshot.py
      - run: python scripts/altpaper.py
      - run: python scripts/wallets.py
      - run: python scripts/flows.py || true   # non-fatal: trade-flow metrics (GeckoTerminal)
      - run: python scripts/social.py || true  # non-fatal: Telegram mention counts (t.me/s public previews)
      - run: python scripts/forensics.py || true  # non-fatal: bundle detection via funding-source clustering
      - run: pip install --quiet numpy pandas requests
      - run: python scripts/xs_forward.py || true   # non-fatal: never break the snapshot
      - run: |
          git config user.name "snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "snapshot+paper $(date -u +%F)"
          git pull --rebase origin main
          git push
