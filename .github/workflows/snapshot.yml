name: Daily snapshot
on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/snapshot.py
      - run: |
          git config user.name "snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "snapshot $(date -u +%F)"
          git push
