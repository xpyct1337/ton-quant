name: Daily snapshot
on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: data-writers
  cancel-in-progress: false
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/universe.py
      - run: python scripts/snapshot.py
      - run: python scripts/paper.py
      - run: python scripts/score.py
      - run: python scripts/altsnapshot.py
      - run: python scripts/altpaper.py
      - run: python scripts/wallets.py
      - name: Optional collectors
        run: |
          : > /tmp/ton-quant-failed
          python scripts/flows.py || echo flows >> /tmp/ton-quant-failed
          python scripts/social.py || echo social >> /tmp/ton-quant-failed
          python scripts/dex_signals.py || echo dex_signals >> /tmp/ton-quant-failed
          python scripts/forensics.py || echo forensics >> /tmp/ton-quant-failed
      - run: pip install --quiet numpy pandas requests
      - run: python scripts/xs_forward.py || echo xs_forward >> /tmp/ton-quant-failed
      - run: python scripts/xs_audit.py || echo xs_audit >> /tmp/ton-quant-failed
      - run: |
          python scripts/health.py --write --validate \
            --checked snapshot wallets flows social forensics dex_signals signals xs_forward xs_audit \
            --failed $(tr '\n' ' ' < /tmp/ton-quant-failed)
      - run: |
          git config user.name "snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "snapshot+paper $(date -u +%F)"
          ok=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main 2>/dev/null && git push; then
              ok=1; break
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((i * 15))
          done
          [ "$ok" = "1" ] || echo "::warning::push failed after 5 attempts, will retry tomorrow"
