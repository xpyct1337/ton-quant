name: Deploy site
on:
  push:
    branches: [main]
    paths-ignore: ['data/**', '**.md', 'scripts/**']
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app
        env:
          BASE_PATH: /ton-quant
      - name: Copy legacy static pages into build
        run: |
          shopt -s nullglob
          for f in *.html; do [ "$f" = "index.html" ] || cp "$f" app/build/; done
          [ -f styles.css ] && cp styles.css app/build/ || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/build
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
