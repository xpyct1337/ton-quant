name: Intraday snapshot
on:
  schedule:
    # every 4h; main daily snapshot owns 03:10 UTC so we skip that hour.
    # to move to hourly: change to "10 * * * *"
    - cron: "10 */4 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  intraday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: INTRADAY=1 python scripts/snapshot.py
      - run: |
          git config user.name "snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/intraday
          git diff --cached --quiet || git commit -m "intraday $(date -u +%F)"
          ok=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main 2>/dev/null && git push; then
              ok=1; break
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((i * 15))
          done
          [ "$ok" = "1" ] || echo "::warning::push failed after 5 attempts, will retry tomorrow"
