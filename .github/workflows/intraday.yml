name: Intraday snapshot
on:
  schedule:
    - cron: "10 15 * * *"   # second daily slice (main snapshot runs 03:10 UTC)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  intraday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: INTRADAY=1 python scripts/snapshot.py
      - run: |
          git config user.name "snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/intraday
          git diff --cached --quiet || git commit -m "intraday $(date -u +%F)"
          git push
