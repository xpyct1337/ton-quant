name: Verify

on:
  push:
    branches: [main]
    paths-ignore: ['data/**', '**.md']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: |
          for f in scripts/*_test.py tests/*.test.py; do python "$f"; done
      - run: python scripts/health.py --validate

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm test
        working-directory: app
      - run: npm run build
        working-directory: app
        env:
          BASE_PATH: /ton-quant
